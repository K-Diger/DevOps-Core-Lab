apiVersion: v1
kind: Service
metadata:
  name: {{ include "mis-app.fullname" . }}
  labels:
    {{- include "mis-app.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "mis-app.selectorLabels" . | nindent 4 }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
      name: http
