fullnameOverride: observer-api
image:
  repository: mis-observer/mis-observer-api
otel:
  serviceName: mis-observer-api
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 1Gi
# Observer has management.endpoint.health.probes.enabled=true
# so /liveness and /readiness sub-paths are available
probes:
  startup:
    enabled: true
    path: /actuator/health
  readiness:
    path: /actuator/health/readiness
  liveness:
    path: /actuator/health/liveness
httpRoute:
  enabled: true
  hostname: observer.lab-dev.local
rollout:
  strategy:
    canary:
      analysis:
        templates:
          - templateName: success-rate
            clusterScope: true
        args:
          - name: service-name
            value: mis-observer-api
          - name: namespace
            value: mis-dev
