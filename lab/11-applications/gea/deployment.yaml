apiVersion: apps/v1
kind: Deployment
metadata:
  name: gea-api
  namespace: mis-dev
  labels:
    app: gea-api
    app.kubernetes.io/name: gea-api
    app.kubernetes.io/part-of: mis-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gea-api
  template:
    metadata:
      labels:
        app: gea-api
        app.kubernetes.io/name: gea-api
    spec:
      imagePullSecrets:
        - name: harbor-pull-secret
      containers:
        - name: gea-api
          image: dev-mis-registry.smiledev.net/ep-be-gea/dev-gea-api:latest
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: dev
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector.monitoring.svc:4318
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: http/protobuf
            - name: OTEL_SDK_DISABLED
              value: "false"
            - name: OTEL_SERVICE_NAME
              value: ep-be-gea-api
            - name: OTEL_METRICS_ENABLED
              value: "true"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "service.namespace=mis-dev,deployment.environment=development"
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: gea-api
  namespace: mis-dev
  labels:
    app: gea-api
spec:
  selector:
    app: gea-api
  ports:
    - port: 8080
      targetPort: 8080
      name: http
