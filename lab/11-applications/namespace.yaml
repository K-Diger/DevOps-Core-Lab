apiVersion: v1
kind: Namespace
metadata:
  name: mis-dev
  labels:
    istio.io/dataplane-mode: ambient
    env: dev
    team: platform
---
# ResourceQuota matching production
apiVersion: v1
kind: ResourceQuota
metadata:
  name: mis-dev-quota
  namespace: mis-dev
spec:
  hard:
    requests.cpu: "16"
    requests.memory: 32Gi
    limits.cpu: "32"
    limits.memory: 64Gi
    pods: "50"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: mis-dev-limits
  namespace: mis-dev
spec:
  limits:
    - type: Container
      default:
        cpu: "1"
        memory: 2Gi
      defaultRequest:
        cpu: 250m
        memory: 512Mi
