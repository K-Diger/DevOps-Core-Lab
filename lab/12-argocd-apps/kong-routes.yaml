# HTTPRoute for EAM API
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: eam-api
  namespace: mis-dev
spec:
  parentRefs:
    - name: kong-gateway
      namespace: kong
      sectionName: http
  hostnames:
    - "eam.lab-dev.local"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: eam-api
          port: 8080
---
